<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* 页面标题 */
        h1 {
            color: #1a1a1a;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        /* 卡片容器 */
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        /* 头像容器 */
        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #e8f0fe;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .avatar-container:hover {
            border-color: #1677ff;
        }

        #avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #avatar-upload {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* 信息展示区域 */
        .info-display {
            width: 100%;
            text-align: center;
        }

        #name-display {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        #bio-display {
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
            min-height: 40px;
        }

        /* 编辑区域 */
        .edit-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 14px;
            color: #333333;
            font-weight: 500;
        }

        .input-group input,
        .input-group textarea {
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #1677ff;
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.1);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* 保存按钮 */
        #save-btn {
            margin-top: 8px;
            padding: 12px 24px;
            background-color: #1677ff;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #save-btn:hover {
            background-color: #4096ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
        }

        #save-btn:active {
            transform: translateY(0);
        }

        /* 响应式适配 */
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <h1>个人信息卡片</h1>

    <div class="card">
        <!-- 头像区域 -->
        <div class="avatar-container">
            <img id="avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="个人头像">
            <input type="file" id="avatar-upload" accept="image/*">
        </div>

        <!-- 信息展示区域 -->
        <div class="info-display">
            <div id="name-display">请输入姓名</div>
            <div id="bio-display">请输入个人简介</div>
        </div>

        <!-- 编辑区域 -->
        <div class="edit-area">
            <div class="input-group">
                <label for="name-input">姓名</label>
                <input type="text" id="name-input" placeholder="请输入您的姓名">
            </div>
            <div class="input-group">
                <label for="bio-input">个人简介</label>
                <textarea id="bio-input" placeholder="请输入您的个人简介"></textarea>
            </div>
            <button id="save-btn">保存</button>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const avatar = document.getElementById('avatar');
        const avatarUpload = document.getElementById('avatar-upload');
        const nameDisplay = document.getElementById('name-display');
        const bioDisplay = document.getElementById('bio-display');
        const nameInput = document.getElementById('name-input');
        const bioInput = document.getElementById('bio-input');
        const saveBtn = document.getElementById('save-btn');

        // 头像上传功能
        avatarUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    avatar.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // 保存按钮点击事件
        saveBtn.addEventListener('click', () => {
            // 获取输入框内容
            const newName = nameInput.value.trim();
            const newBio = bioInput.value.trim();

            // 更新显示内容
            if (newName) {
                nameDisplay.textContent = newName;
            }
            if (newBio) {
                bioDisplay.textContent = newBio;
            }

            // 提示保存成功
            alert('信息保存成功！');
        });

        // 支持回车键保存
        bioInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                saveBtn.click();
            }
        });
    </script>
</body>
</html>
